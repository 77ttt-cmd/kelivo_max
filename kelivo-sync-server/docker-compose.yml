version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kelivo_sync
      POSTGRES_USER: kelivo
      POSTGRES_PASSWORD: kelivo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://kelivo:kelivo_dev@db:5432/kelivo_sync"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      - db

volumes:
  pgdata:
